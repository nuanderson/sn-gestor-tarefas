{% load static %}
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SN Gestor — Entrar</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  :root{
    --gold:#C8A45E;--gold-dark:#A07838;--gold-light:#E8D5A0;
    --black:#0D0D0D;--dark:#1A1A1A;--dark2:#242424;
    --white:#FFFFFF;--muted:#888;--border:#2a2a2a;
    --red:#E74C3C;--green:#2ECC71;
  }
  body{
    font-family:'Segoe UI',system-ui,sans-serif;
    background:var(--black);
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:20px;
  }

  /* Fundo com padrão sutil */
  body::before{
    content:'';
    position:fixed;inset:0;
    background:
      radial-gradient(ellipse at 20% 50%, rgba(200,164,94,.06) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 20%, rgba(200,164,94,.04) 0%, transparent 50%);
    pointer-events:none;
  }

  .login-card{
    background:var(--dark);
    border:1px solid var(--border);
    border-radius:20px;
    padding:48px 40px;
    width:100%;
    max-width:420px;
    position:relative;
    box-shadow:0 24px 64px rgba(0,0,0,.6);
  }
  .login-card::before{
    content:'';
    position:absolute;top:0;left:0;right:0;
    height:3px;
    background:linear-gradient(90deg,var(--gold-dark),var(--gold),var(--gold-light));
    border-radius:20px 20px 0 0;
  }

  /* Logo */
  .logo{text-align:center;margin-bottom:32px}
  .logo img{
    width:180px;
    height:auto;
    display:block;
    margin:0 auto;
    filter:drop-shadow(0 4px 16px rgba(200,164,94,.25));
  }

  /* Form */
  h2{
    color:var(--white);
    font-size:22px;font-weight:700;
    margin-bottom:6px;
  }
  .subtitle{
    color:var(--muted);
    font-size:13px;
    margin-bottom:28px;
  }

  .form-group{margin-bottom:18px}
  label{
    display:block;
    font-size:12px;font-weight:600;
    color:#aaa;
    margin-bottom:7px;
    text-transform:uppercase;
    letter-spacing:.5px;
  }
  .input-wrap{position:relative}
  .input-wrap svg{
    position:absolute;left:14px;top:50%;
    transform:translateY(-50%);
    color:var(--muted);
    width:16px;height:16px;
    pointer-events:none;
  }
  input{
    width:100%;
    background:var(--dark2);
    border:1.5px solid var(--border);
    border-radius:10px;
    padding:12px 14px 12px 42px;
    color:var(--white);
    font-size:14px;
    font-family:inherit;
    transition:.2s;
    outline:none;
  }
  input:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(200,164,94,.12)}
  input::placeholder{color:#555}

  /* Toggle senha */
  .toggle-senha{
    position:absolute;right:14px;top:50%;
    transform:translateY(-50%);
    background:none;border:none;
    cursor:pointer;color:var(--muted);
    padding:0;display:flex;
    transition:.2s;
  }
  .toggle-senha:hover{color:var(--gold)}

  /* Botão entrar */
  .btn-entrar{
    width:100%;
    background:linear-gradient(135deg,var(--gold-dark),var(--gold));
    color:var(--black);
    border:none;
    border-radius:10px;
    padding:14px;
    font-size:14px;font-weight:800;
    cursor:pointer;
    transition:.2s;
    margin-top:8px;
    letter-spacing:.3px;
    display:flex;align-items:center;justify-content:center;gap:8px;
  }
  .btn-entrar:hover{opacity:.9;transform:translateY(-1px);box-shadow:0 6px 20px rgba(200,164,94,.3)}
  .btn-entrar:active{transform:translateY(0)}
  .btn-entrar:disabled{opacity:.6;cursor:not-allowed;transform:none}

  /* Spinner no botão */
  .spinner{
    width:16px;height:16px;
    border:2px solid rgba(0,0,0,.3);
    border-top-color:var(--black);
    border-radius:50%;
    animation:spin .6s linear infinite;
    display:none;
  }
  @keyframes spin{to{transform:rotate(360deg)}}

  /* Mensagem de erro */
  .alert{
    background:#3a1515;
    border:1px solid #5a2020;
    border-left:3px solid var(--red);
    border-radius:8px;
    padding:12px 14px;
    font-size:13px;
    color:#f5a5a5;
    margin-bottom:16px;
    display:none;
    align-items:center;gap:8px;
  }
  .alert.show{display:flex}

  /* Mensagem de sucesso */
  .alert-success{
    background:#0e2a1a;
    border:1px solid #1a5c35;
    border-left:3px solid var(--green);
    color:#7dd9a8;
  }

  .forgot{
    text-align:right;
    margin-top:10px;
  }
  .forgot a{
    color:var(--muted);
    font-size:12px;
    text-decoration:none;
    transition:.2s;
  }
  .forgot a:hover{color:var(--gold)}

  .divider{
    border:none;
    border-top:1px solid var(--border);
    margin:24px 0;
  }

  .footer-text{
    text-align:center;
    font-size:11px;
    color:#444;
  }

  /* Responsivo */
  @media(max-width:480px){
    .login-card{padding:36px 24px}
  }
</style>
</head>
<body>

<div class="login-card">
  <!-- Logo -->
  <div class="logo">
    <img src="{% static 'img/logo-sn.png' %}" alt="Suzane Neves — Gestão Estratégica em Saúde">
  </div>

  <h2>Bem-vindo(a) 👋</h2>
  <p class="subtitle">Entre com suas credenciais para acessar o sistema.</p>

  <!-- Alerta de erro -->
  <div class="alert" id="alert-erro">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
    </svg>
    <span id="alert-msg">E-mail ou senha incorretos.</span>
  </div>

  <!-- Formulário -->
  <form id="form-login" onsubmit="fazerLogin(event)">
    {% csrf_token %}

    <div class="form-group">
      <label for="email">E-mail</label>
      <div class="input-wrap">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
          <polyline points="22,6 12,13 2,6"/>
        </svg>
        <input
          type="email" id="email" name="email"
          placeholder="seu@email.com"
          autocomplete="email" required autofocus>
      </div>
    </div>

    <div class="form-group">
      <label for="senha">Senha</label>
      <div class="input-wrap">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
          <path d="M7 11V7a5 5 0 0110 0v4"/>
        </svg>
        <input
          type="password" id="senha" name="senha"
          placeholder="Sua senha"
          autocomplete="current-password" required>
        <button type="button" class="toggle-senha" onclick="toggleSenha()" tabindex="-1">
          <svg id="ico-olho" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
          </svg>
        </button>
      </div>
    </div>

    <div class="forgot">
      <a href="#">Esqueci minha senha</a>
    </div>

    <button type="submit" class="btn-entrar" id="btn-entrar">
      <div class="spinner" id="spinner"></div>
      <span id="btn-texto">Entrar no sistema</span>
    </button>
  </form>

  <hr class="divider">
  <p class="footer-text">SN Gestor v2.0 · Suzane Neves Gestão Estratégica em Saúde</p>
</div>

<script>
  function toggleSenha() {
    const input = document.getElementById('senha');
    const ico   = document.getElementById('ico-olho');
    if (input.type === 'password') {
      input.type = 'text';
      ico.innerHTML = '<path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>';
    } else {
      input.type = 'password';
      ico.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
    }
  }

  function mostrarErro(msg) {
    const el = document.getElementById('alert-erro');
    document.getElementById('alert-msg').textContent = msg;
    el.classList.remove('alert-success');
    el.classList.add('show');
  }

  function setCarregando(loading) {
    const btn     = document.getElementById('btn-entrar');
    const spinner = document.getElementById('spinner');
    const texto   = document.getElementById('btn-texto');
    btn.disabled       = loading;
    spinner.style.display = loading ? 'block' : 'none';
    texto.textContent  = loading ? 'Entrando...' : 'Entrar no sistema';
  }

  async function fazerLogin(e) {
    e.preventDefault();
    document.getElementById('alert-erro').classList.remove('show');
    setCarregando(true);

    const email = document.getElementById('email').value.trim();
    const senha = document.getElementById('senha').value;

    // Pega o CSRF token do cookie
    const csrf = document.cookie.split(';')
      .find(c => c.trim().startsWith('csrftoken='))
      ?.split('=')[1] || '';

    try {
      const res = await fetch('/api/v1/auth/login/', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'X-CSRFToken': csrf,
        },
        body: JSON.stringify({ email, senha }),
      });

      const data = await res.json();

      if (res.ok) {
        // Login com sucesso → redireciona para o sistema
        window.location.href = '/';
      } else {
        const msg = data?.non_field_errors?.[0]
          || data?.email?.[0]
          || data?.senha?.[0]
          || 'Erro ao realizar login. Tente novamente.';
        mostrarErro(msg);
        setCarregando(false);
      }
    } catch (err) {
      mostrarErro('Erro de conexão. Verifique sua internet.');
      setCarregando(false);
    }
  }
</script>
</body>
</html>
