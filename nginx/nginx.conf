upstream django_backend {
    server backend:8000;
}

# Redireciona HTTP → HTTPS
server {
    listen 80;
    server_name app.gestaomedhospitalar.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS principal
server {
    listen 443 ssl;
    server_name app.gestaomedhospitalar.com;

    ssl_certificate     /etc/letsencrypt/live/app.gestaomedhospitalar.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/app.gestaomedhospitalar.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    client_max_body_size 20M;

    access_log /var/log/nginx/sn_access.log;
    error_log  /var/log/nginx/sn_error.log;

    location / {
        proxy_pass         http://django_backend;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_redirect     off;
        proxy_read_timeout 90;
    }

    location /static/ {
        alias /app/staticfiles/;
        expires 1h;
        add_header Cache-Control "public, must-revalidate";
    }

    location /media/ {
        alias /app/media/;
        expires 7d;
    }
}
